services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: twitterdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports: ["5432:5432"]
    volumes:
      - postgres_data:/var/lib/postgresql/data/
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./microblog_project/backend
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/twitterdb
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./microblog_project/backend/static/media:/app/static/media

  nginx:
    image: nginx:alpine
    ports: ["80:80"]
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./microblog_project/frontend/dist:/var/www/frontend:ro
      - ./microblog_project/backend/static/media:/var/www/media:ro
    depends_on:
      - api

volumes:
  postgres_data:
